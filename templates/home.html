<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>duck-notes</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/static/favicon.ico">

</head>
<body>
    <h1>Hello, {{ name }}</h1> 
    <form action="/note/new" method ="POST">
        <button class="create-btn" type="submit">+</button>
    </form>
    <hr>
    <div class="notes-container">
        {% for note in notes %}
        <a class="note" href="/note/{{ note.id }}">
            <h2>{{ note.title }}</h2>
            <p>{{ note.content }}</p>
        </a>
        {% endfor %}
    </div>
</body>
</html>
