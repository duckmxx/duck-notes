<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ note.title }} - duck-notes</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/static/favicon.ico">
</head>
<body>
    <a class="back-link" href="/">Back to notes</a>

    <article class="full-note">
        <form action="/note/{{ note.id }}/edit" method="POST" class="note-form">
            <label for="title">Title</label>
            <input id="title" name="title" value="{{ note.title }}" required autofocus>
            
            <label for="content">Content</label>
            <textarea id="content" name="content">{{ note.content }}</textarea>

            <button type="submit">Save Changes</button>
        </form>

        <form action="/note/{{ note.id }}/delete" method="POST">
            <button type="submit" class="delete-btn">Delete note</button>
        </form>
    </article>
</body>
</html>
